<!DOCTYPE html>
<html>
<head>
    <title>Waste Classification AI</title>
</head>
<body>
    <h1>Upload Waste Image</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <input type="submit" value="Predict">
    </form>

    {% if result %}
        <h2>Prediction: {{ result }}</h2>
    {% endif %}
</body>
</html>
